repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

  - repo: local
    hooks:
      - id: django-migration-reminder
        name: Django Migration Reminder
        entry: "bash -c 'if git diff --cached --name-only | grep models.py; then echo -e \"\\033[1;33m⚠️  REMEMBER: Make and apply migrations! ⚠️\\033[0m\"; fi'"
        language: system
        files: \.py$

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []

  - repo: local
    hooks:
      - id: check-branch-name
        name: Enforce Branch Naming Prefixes
        entry: |
          bash -c '
          BRANCH_NAME=$(git branch --show-current)
          REGEX="^(feat|bugfix|hotfix|release|docs|refactor|test|chore)/[a-zA-Z0-9._-]+$"

          if [[ ! $BRANCH_NAME =~ $REGEX \
                && $BRANCH_NAME != "main" \
                && $BRANCH_NAME != "dev" \
                && $BRANCH_NAME != "master" ]]; then
            echo "ERROR: Invalid branch name: $BRANCH_NAME"
            echo "Your branch must use a valid prefix. Example: feat/user-login"
            exit 1
          fi
          '
        language: system
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: prevent-direct-commit
        name: Prevent commits on protected branches
        language: system
        entry: |
          bash -c '
          BRANCH=$(git branch --show-current)

          if [[ "$BRANCH" == "main" || "$BRANCH" == "dev" ]]; then
              echo ""
              echo "Direct commits to $BRANCH are not allowed."
              echo "Create a feature branch instead."
              echo ""
              exit 1
          fi
          '
        stages: [pre-commit]
